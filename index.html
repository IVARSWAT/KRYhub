<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYhub | IVAR Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', 'Poppins', sans-serif; background: #020202; color: white; scroll-behavior: smooth; overflow-x: hidden; position: relative; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.3s ease; }
        .neon-cyan { color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.4); }
        .modal-bg { background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(12px); z-index: 60; }
        
        input, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #00ffff !important; box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); outline: none; }
        
        .map-tag { background: linear-gradient(135deg, #00ffff, #0080ff); color: #000; font-weight: 800; padding: 2px 12px; border-radius: 6px; font-size: 0.7rem; }
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        #top-alert { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 68, 68, 0.95); color: white; padding: 12px 30px;
            border-radius: 0 0 20px 20px; font-size: 13px; z-index: 200;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none; -webkit-user-select: none; font-weight: bold;
            box-shadow: 0 5px 25px rgba(255, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; white-space: nowrap;
        }
        #top-alert.show { top: 0; }

        .hidden { display: none !important; }
        
        /* زر الإغلاق الجديد العلوي */
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .close-btn:hover { opacity: 1; color: #ff4444; }

        .script-card { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <canvas id="snow-canvas"></canvas>
    <div id="top-alert" data-tr="alertText">هذا الشخص مجهول الهوية ربما السكربت يكون مضر</div>

    <div class="content-layer relative z-10">
        <nav class="glass sticky top-0 p-4 border-b border-white/5 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="text-3xl font-black neon-cyan tracking-tighter cursor-pointer" onclick="location.reload()">KRY<span class="text-white">hub</span></h1>
                    <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest" id="nav-desc" data-tr="navDesc">Roblox Lua Community</span>
                </div>
                <div class="flex gap-4 items-center">
                    <div id="user-info" class="hidden flex items-center gap-3">
                        <span id="logged-username" class="text-cyan-400 font-bold text-sm bg-cyan-400/10 px-3 py-1 rounded-full border border-cyan-400/20"></span>
                        <button onclick="logout()" class="text-[10px] text-red-500 hover:underline" data-tr="logout">خروج</button>
                    </div>
                    <button id="auth-nav-btn" onclick="openModal('auth-modal')" class="text-sm font-bold hover:text-cyan-400 transition" data-tr="loginBtn">دخول</button>
                    <button onclick="openModal('publish-modal')" class="bg-cyan-600 hover:bg-cyan-500 px-5 py-2 rounded-xl text-sm font-bold transition" data-tr="publishNav">انشر</button>
                    <button onclick="toggleLang()" class="text-xs opacity-50 hover:opacity-100 font-bold" id="lang-btn">EN</button>
                </div>
            </div>
        </nav>

        <header class="py-16 px-4 text-center">
            <h2 class="text-5xl font-black mb-4 tracking-tight" id="hero-title" data-tr="heroTitle">مجتمع سكربتات Roblox Lua</h2>
            <p class="text-gray-400 text-sm mb-8 max-w-lg mx-auto" id="hero-desc" data-tr="heroDesc">المكان الأفضل لمشاركة وتحميل سكربتات Lua الآمنة والموثوقة.</p>
            
            <div class="max-w-2xl mx-auto relative group">
                <div class="absolute inset-0 bg-cyan-500/10 blur-3xl group-hover:bg-cyan-500/20 transition duration-500 rounded-full"></div>
                <div class="relative flex items-center">
                    <input type="text" id="search-input" oninput="filterScripts()" placeholder="ابحث عن ماب، سكربت، أو ناشر..." data-tr-placeholder="searchPlace" class="w-full p-5 pr-14 rounded-2xl text-lg shadow-2xl">
                    <svg class="absolute right-5 w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="scripts-container"></div>
            <div id="no-results" class="hidden text-center py-20 text-gray-500" data-tr="noResults">لا توجد نتائج تطابق بحثك..</div>
        </main>
    </div>

    <div id="auth-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-bg hidden">
        <div class="glass w-full max-w-md rounded-3xl p-8 border border-cyan-500/20 relative">
            <div class="close-btn" onclick="closeModal('auth-modal')">✕</div>
            <div class="flex gap-6 mb-8 border-b border-white/5">
                <button onclick="toggleAuthMode('login')" id="tab-login" class="pb-3 text-lg font-bold border-b-2 border-cyan-500" data-tr="loginTab">دخول</button>
                <button onclick="toggleAuthMode('signup')" id="tab-signup" class="pb-3 text-lg font-bold text-gray-500" data-tr="signupTab">تسجيل</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="اسم المستخدم" data-tr-placeholder="userPlace" class="w-full p-4 rounded-xl">
                <input type="password" id="auth-pass" placeholder="الرمز السري" data-tr-placeholder="passPlace" class="w-full p-4 rounded-xl">
                <button onclick="handleAuth()" class="w-full py-4 bg-cyan-600 rounded-xl font-bold hover:bg-cyan-500 transition shadow-lg shadow-cyan-900/20" data-tr="confirmBtn">تأكيد</button>
            </div>
        </div>
    </div>

    <div id="publish-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-bg hidden">
        <div class="glass w-full max-w-2xl rounded-3xl p-8 border border-white/10 relative">
            <div class="close-btn" onclick="closeModal('publish-modal')">✕</div>
            <h2 class="text-2xl font-bold text-cyan-400 mb-6" data-tr="publishTitle">نشر سكربت جديد</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5">
                    <span class="text-sm font-bold" data-tr="publishAnon">نشر كمجهول (Anonymous)</span>
                    <input type="checkbox" id="anon-check" class="w-5 h-5 accent-cyan-500">
                </div>
                <input type="file" id="in-file" accept="image/*" class="text-xs text-gray-400 w-full">
                <input type="text" id="in-name" placeholder="اسم السكربت" data-tr-placeholder="scriptNamePlace" class="w-full p-4 rounded-xl">
                <input type="text" id="in-map" placeholder="اسم الماب" data-tr-placeholder="mapNamePlace" class="w-full p-4 rounded-xl">
                <textarea id="in-desc" rows="2" placeholder="وصف السكربت..." data-tr-placeholder="descPlace" class="w-full p-4 rounded-xl"></textarea>
                <textarea id="in-code" rows="5" placeholder="كود Lua..." data-tr-placeholder="codePlace" class="w-full p-4 rounded-xl font-mono text-xs"></textarea>
                <button onclick="processPublish()" class="w-full py-4 bg-cyan-600 font-bold rounded-2xl shadow-xl hover:bg-cyan-500 transition transform hover:scale-[1.02]" data-tr="publishBtn">انشر الآن</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('kry_session')) || null;
        let scripts = JSON.parse(localStorage.getItem('kry_scripts')) || [];
        let users = JSON.parse(localStorage.getItem('kry_users')) || [];
        let currentLang = 'ar';
        let authMode = 'login';
        let pressTimer;

        // القاموس الشامل للترجمة الجذرية
        const dictionary = {
            ar: {
                navDesc: "مجتمع سكربتات Roblox Lua", loginBtn: "دخول", publishNav: "انشر", logout: "خروج",
                heroTitle: "مجتمع سكربتات Roblox Lua", heroDesc: "المكان الأفضل لمشاركة وتحميل سكربتات Lua الآمنة والموثوقة.",
                searchPlace: "ابحث عن ماب، سكربت، أو ناشر...", noResults: "لا توجد نتائج تطابق بحثك..",
                loginTab: "دخول", signupTab: "تسجيل", userPlace: "اسم المستخدم", passPlace: "الرمز السري", confirmBtn: "تأكيد",
                publishTitle: "نشر سكربت جديد", publishAnon: "نشر كمجهول (Anonymous)", scriptNamePlace: "اسم السكربت", 
                mapNamePlace: "اسم الماب", descPlace: "وصف السكربت...", codePlace: "كود Lua...", publishBtn: "انشر الآن",
                copyBtn: "نسخ الكود", deleteBtn: "حذف", sensitivity: "حماية حساسية", alertText: "هذا الشخص مجهول الهوية ربما السكربت يكون مضر",
                msgFill: "يرجى ملء كافة الحقول!", msgExist: "الاسم مسجل بالفعل!", msgWelcome: "أهلاً بك أيها المسؤول IVAR", msgSuccess: "تم تسجيل الدخول!", msgError: "البيانات غير صحيحة!", msgCopied: "تم النسخ!"
            },
            en: {
                navDesc: "Roblox Lua Community", loginBtn: "Login", publishNav: "Publish", logout: "Logout",
                heroTitle: "Roblox Lua Scripts", heroDesc: "The ultimate hub for safe and verified Lua scripts.",
                searchPlace: "Search maps, scripts, or authors...", noResults: "No results found..",
                loginTab: "Login", signupTab: "Sign Up", userPlace: "Username", passPlace: "Password", confirmBtn: "Confirm",
                publishTitle: "Publish New Script", publishAnon: "Post as Anonymous", scriptNamePlace: "Script Name", 
                mapNamePlace: "Map Name", descPlace: "Short description...", codePlace: "Lua Code...", publishBtn: "Post Now",
                copyBtn: "Copy Code", deleteBtn: "Delete", sensitivity: "Sensitivity", alertText: "This user is anonymous, script might be risky.",
                msgFill: "Please fill all fields!", msgExist: "Username already exists!", msgWelcome: "Welcome Admin IVAR", msgSuccess: "Login Successful!", msgError: "Invalid credentials!", msgCopied: "Copied!"
            }
        };

        // --- نظام الترجمة الذكي ---
        function applyTranslation() {
            const l = dictionary[currentLang];
            document.querySelectorAll('[data-tr]').forEach(el => {
                const key = el.getAttribute('data-tr');
                if (l[key]) el.innerText = l[key];
            });
            document.querySelectorAll('[data-tr-placeholder]').forEach(el => {
                const key = el.getAttribute('data-tr-placeholder');
                if (l[key]) el.placeholder = l[key];
            });
            document.getElementById('lang-btn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            renderScripts();
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            applyTranslation();
        }

        // --- نظام تسجيل الدخول ---
        function handleAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            const l = dictionary[currentLang];
            
            if(!u || !p) return alert(l.msgFill);

            if(authMode === 'signup') {
                if(users.find(x => x.username.toLowerCase() === u.toLowerCase())) return alert(l.msgExist);
                users.push({ username: u, password: p });
                localStorage.setItem('kry_users', JSON.stringify(users));
                alert(l.msgSuccess); toggleAuthMode('login');
            } else {
                const found = users.find(x => x.username.toLowerCase() === u.toLowerCase());
                if(found && found.password === p) {
                    currentUser = found;
                    if(u.toUpperCase() === "IVAR") { currentUser.isAdmin = true; alert(l.msgWelcome); }
                    localStorage.setItem('kry_session', JSON.stringify(currentUser));
                    updateUI(); closeModal('auth-modal');
                } else {
                    alert(l.msgError);
                }
            }
        }

        // --- نظام النشر المطور ---
        function processPublish() {
            const n = document.getElementById('in-name').value;
            const m = document.getElementById('in-map').value;
            const isAnon = document.getElementById('anon-check').checked;
            const f = document.getElementById('in-file').files[0];
            const l = dictionary[currentLang];

            if(!n || !m) return alert(l.msgFill);

            const reader = new FileReader();
            reader.onload = (e) => {
                scripts.unshift({ 
                    id: Date.now(), name: n, map: m, 
                    desc: document.getElementById('in-desc').value, 
                    code: document.getElementById('in-code').value, 
                    image: e.target.result || null, 
                    author: isAnon ? "Anonymous" : (currentUser ? currentUser.username : "Anonymous"),
                    isGuest: isAnon || !currentUser
                });
                localStorage.setItem('kry_scripts', JSON.stringify(scripts));
                renderScripts(); closeModal('publish-modal');
                // Reset
                document.getElementById('in-name').value=''; document.getElementById('in-map').value='';
                document.getElementById('anon-check').checked = false;
            };
            if(f) reader.readAsDataURL(f); else reader.onload({target:{result:null}});
        }

        function renderScripts() {
            const container = document.getElementById('scripts-container');
            container.innerHTML = '';
            const l = dictionary[currentLang];
            scripts.forEach(s => {
                const isAdmin = currentUser && currentUser.username.toUpperCase() === "IVAR";
                const isOwner = currentUser && currentUser.username === s.author;

                const card = document.createElement('div');
                card.className = "script-card glass p-6 rounded-3xl flex flex-col hover:border-cyan-500/40 relative";
                card.setAttribute('data-search', `${s.name} ${s.map} ${s.author}`);
                
                card.innerHTML = `
                    ${s.image ? `<img src="${s.image}" class="w-full h-40 object-cover rounded-2xl mb-4">` : ''}
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold">${s.name}</h3>
                        ${s.isGuest ? `
                            <span class="sensitivity-badge bg-red-500/20 text-red-500 text-[9px] px-2 py-1 rounded-md font-bold cursor-help" 
                                  onmousedown="startPress(event)" onmouseup="endPress()" ontouchstart="startPress(event)" ontouchend="endPress()">
                                ${l.sensitivity}
                            </span>` : ''}
                    </div>
                    <div class="mb-4"><span class="map-tag">${s.map}</span></div>
                    <p class="text-xs text-gray-500 mb-6 line-clamp-2">${s.desc || '...'}</p>
                    <div class="mt-auto flex gap-2">
                        <button onclick="copyCode('${s.code}')" class="flex-1 bg-cyan-500/10 text-cyan-400 py-3 rounded-xl font-bold border border-cyan-500/20 hover:bg-cyan-500 hover:text-white transition">${l.copyBtn}</button>
                        ${(isAdmin || (isOwner && s.author !== 'Anonymous')) ? `<button onclick="deleteScript(${s.id})" class="bg-red-500/10 text-red-400 px-4 rounded-xl text-xs hover:bg-red-500 transition">${l.deleteBtn}</button>` : ''}
                    </div>
                    <div class="mt-3 opacity-30 text-[9px]">BY: ${s.author} ${s.author.toUpperCase()==='IVAR'?'⭐':''}</div>
                `;
                container.appendChild(card);
            });
            filterScripts();
        }

        // --- المساعدات ---
        function startPress(e) { if(e.cancelable) e.preventDefault(); pressTimer = setTimeout(() => { document.getElementById('top-alert').classList.add('show'); }, 300); }
        function endPress() { clearTimeout(pressTimer); document.getElementById('top-alert').classList.remove('show'); }
        function copyCode(t) { navigator.clipboard.writeText(t); alert(dictionary[currentLang].msgCopied); }
        function filterScripts() { const q = document.getElementById('search-input').value.toLowerCase().trim(); document.querySelectorAll('.script-card').forEach(c => { c.style.display = c.getAttribute('data-search').toLowerCase().includes(q) ? 'flex' : 'none'; }); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function logout() { currentUser = null; localStorage.removeItem('kry_session'); updateUI(); }
        function toggleAuthMode(m) { authMode = m; document.getElementById('tab-login').className = m==='login'?'pb-3 text-lg font-bold border-b-2 border-cyan-500':'pb-3 text-lg font-bold text-gray-500'; document.getElementById('tab-signup').className = m==='signup'?'pb-3 text-lg font-bold border-b-2 border-cyan-500':'pb-3 text-lg font-bold text-gray-500'; }

        function updateUI() {
            if(currentUser) {
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('logged-username').innerText = currentUser.username;
                document.getElementById('auth-nav-btn').classList.add('hidden');
            } else {
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('auth-nav-btn').classList.remove('hidden');
            }
            applyTranslation();
        }

        // Snow
        (function() {
            const canvas = document.getElementById('snow-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, flakes = [];
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            function init() { flakes = []; for(let i=0; i<60; i++) flakes.push({x: Math.random()*w, y: Math.random()*h, r: Math.random()*2+1, d: Math.random()*0.5}); }
            function draw() { ctx.clearRect(0,0,w,h); ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); for(let f of flakes) { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); } ctx.fill(); move(); }
            function move() { for(let f of flakes) { f.y += 0.5 + f.d; if(f.y > h) f.y = -10; } }
            function loop() { draw(); requestAnimationFrame(loop); }
            window.onresize = resize; resize(); init(); loop();
        })();

        updateUI();
    </script>
</body>
</html>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('kry_session')) || null;
        let scripts = JSON.parse(localStorage.getItem('kry_scripts')) || [];
        let users = JSON.parse(localStorage.getItem('kry_users')) || [];
        let currentLang = 'ar';
        let authMode = 'login';
        let pressTimer;

        const trans = {
            ar: { hero: "مجتمع سكربتات Roblox Lua", heroD: "المكان الأفضل لمشاركة وتحميل سكربتات Lua الآمنة والموثوقة.", search: "ابحث عن ماب، سكربت، أو ناشر...", copy: "نسخ الكود", delete: "حذف", guest: "حماية حساسية", logout: "خروج" },
            en: { hero: "Roblox Lua Community", heroD: "The best place to share and download safe Lua scripts.", search: "Search maps, scripts, or authors...", copy: "Copy Code", delete: "Delete", guest: "Sensitivity", logout: "Logout" }
        };

        // --- نظام تسجيل دخول متكامل وصارم ---
        function handleAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            
            if(!u || !p) return alert("يرجى ملء الحقول!");

            if(authMode === 'signup') {
                if(users.find(x => x.username.toLowerCase() === u.toLowerCase())) return alert("الاسم مسجل بالفعل!");
                users.push({ username: u, password: p });
                localStorage.setItem('kry_users', JSON.stringify(users));
                alert("تم إنشاء الحساب! سجل دخولك الآن بنفس الرمز.");
                toggleAuthMode('login');
            } else {
                const found = users.find(x => x.username.toLowerCase() === u.toLowerCase());
                if(found && found.password === p) {
                    currentUser = found;
                    if(u.toUpperCase() === "IVAR") currentUser.isAdmin = true;
                    localStorage.setItem('kry_session', JSON.stringify(currentUser));
                    updateUI(); closeModal('auth-modal');
                } else {
                    alert("اسم المستخدم أو الرمز السري غير صحيح!");
                }
            }
        }

        // --- نظام البحث المطور ---
        function filterScripts() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.script-card');
            let hasResults = false;

            cards.forEach(card => {
                const data = card.getAttribute('data-search').toLowerCase();
                if(data.includes(query)) {
                    card.classList.remove('hidden');
                    hasResults = true;
                } else {
                    card.classList.add('hidden');
                }
            });
            document.getElementById('no-results').classList.toggle('hidden', hasResults);
        }

        // --- عرض المنشورات ---
        function renderScripts() {
            const container = document.getElementById('scripts-container');
            container.innerHTML = '';
            const l = trans[currentLang];
            scripts.forEach(s => {
                const isAdmin = currentUser && currentUser.username.toUpperCase() === "IVAR";
                const isOwner = currentUser && currentUser.username === s.author;

                const card = document.createElement('div');
                card.className = "script-card glass p-6 rounded-3xl flex flex-col hover:border-cyan-500/40 relative";
                card.setAttribute('data-search', `${s.name} ${s.map} ${s.author}`);
                
                card.innerHTML = `
                    ${s.image ? `<img src="${s.image}" class="w-full h-40 object-cover rounded-2xl mb-4">` : ''}
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold">${s.name}</h3>
                        ${s.isGuest ? `
                            <span class="sensitivity-badge bg-red-500/20 text-red-500 text-[9px] px-2 py-1 rounded-md font-bold" 
                                  onmousedown="startPress(event)" onmouseup="endPress()" ontouchstart="startPress(event)" ontouchend="endPress()">
                                ${l.guest}
                            </span>` : ''}
                    </div>
                    <div class="mb-4"><span class="map-tag">${s.map}</span></div>
                    <p class="text-xs text-gray-500 mb-6 line-clamp-2">${s.desc || '...'}</p>
                    <div class="mt-auto flex gap-2">
                        <button onclick="copyCode('${s.code}')" class="flex-1 bg-cyan-500/10 text-cyan-400 py-3 rounded-xl font-bold border border-cyan-500/20 hover:bg-cyan-500 hover:text-white transition">${l.copy}</button>
                        ${(isAdmin || isOwner) ? `<button onclick="deleteScript(${s.id})" class="bg-red-500/10 text-red-400 px-4 rounded-xl text-xs hover:bg-red-500 hover:text-white transition">${l.delete}</button>` : ''}
                    </div>
                    <div class="mt-3 opacity-30 text-[9px]">BY: ${s.author} ${s.author.toUpperCase()==='IVAR'?'⭐':''}</div>
                `;
                container.appendChild(card);
            });
