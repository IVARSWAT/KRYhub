<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYhub | Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020202; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-cyan { color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 100; display: none; }
        input, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; outline: none; }
        input:focus { border-color: #00ffff !important; }
        
        /* تنسيق زر رفع الملفات ليصبح عربياً */
        input[type="file"]::-webkit-file-upload-button { background: #00ffff; border: none; padding: 8px 15px; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; margin-left: 10px; }
        
        #top-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ff4444; padding: 10px 30px; border-radius: 0 0 15px 15px; z-index: 1000; transition: 0.4s; }
        #top-alert.show { top: 0; }
        .map-tag { background: #00ffff; color: black; padding: 2px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>
    <div id="top-alert" data-tr="alertText">هذا الشخص مجهول الهوية ربما السكربت يكون مضر</div>

    <div id="ban-list-panel" class="fixed bottom-4 left-4 z-[200] glass p-3 rounded-xl border-red-500/50 hidden">
        <h4 class="text-[10px] text-red-500 font-bold mb-2">قائمة محظورين IP</h4>
        <div id="banned-ips-container" class="text-[9px] space-y-1"></div>
    </div>

    <nav class="glass sticky top-0 p-4 flex justify-between items-center z-50">
        <h1 class="text-2xl font-black neon-cyan">KRYhub</h1>
        <div class="flex items-center gap-3">
            <div id="user-ui" class="hidden flex items-center gap-2">
                <span id="user-name-display" class="text-xs bg-white/10 px-2 py-1 rounded"></span>
                <button onclick="logout()" class="text-[10px] text-red-500">خروج</button>
            </div>
            <button id="login-nav-btn" onclick="openModal('auth-modal')" class="text-sm font-bold" data-tr="loginBtn">دخول</button>
            <button onclick="openModal('publish-modal')" class="bg-cyan-600 px-4 py-2 rounded-lg text-sm font-bold" data-tr="publishNav">انشر</button>
            <button onclick="toggleLang()" class="text-xs font-bold" id="lang-btn">EN</button>
        </div>
    </nav>

    <header class="py-10 text-center px-4">
        <h2 class="text-3xl font-bold mb-6" data-tr="heroTitle">مجتمع سكربتات Roblox Lua</h2>
        <input type="text" id="search-input" oninput="filterScripts()" placeholder="ابحث..." data-tr-placeholder="searchPlace" class="w-full max-w-md p-4 rounded-xl shadow-2xl">
    </header>

    <main class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6 pb-20" id="scripts-container"></main>

    <div id="auth-modal" class="modal-bg fixed inset-0 flex items-center justify-center p-4">
        <div class="glass w-full max-w-sm p-8 rounded-2xl relative">
            <span class="absolute top-4 right-4 cursor-pointer" onclick="closeModal('auth-modal')">✕</span>
            <div class="flex gap-4 mb-6 border-b border-white/10">
                <button onclick="setAuthMode('login')" id="btn-m-login" class="pb-2 border-b-2 border-cyan-500" data-tr="loginTab">دخول</button>
                <button onclick="setAuthMode('signup')" id="btn-m-signup" class="pb-2 text-gray-500" data-tr="signupTab">تسجيل</button>
            </div>
            <input type="text" id="auth-u" placeholder="الاسم" class="w-full p-3 rounded-lg mb-3">
            <input type="password" id="auth-p" placeholder="الرمز" class="w-full p-3 rounded-lg mb-6">
            <button onclick="submitAuth()" class="w-full bg-cyan-600 py-3 rounded-xl font-bold" data-tr="confirmBtn">تأكيد</button>
        </div>
    </div>

    <div id="publish-modal" class="modal-bg fixed inset-0 flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg p-6 rounded-2xl relative">
            <span class="absolute top-4 right-4 cursor-pointer" onclick="closeModal('publish-modal')">✕</span>
            <h3 class="text-xl font-bold mb-4" data-tr="publishTitle">نشر سكربت</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center text-sm">
                    <span data-tr="publishAnon">نشر كمجهول</span>
                    <input type="checkbox" id="check-anon" class="accent-cyan-500 w-5 h-5">
                </div>
                <div>
                    <label class="text-[10px] block mb-1" data-tr="fileLabel">اختر صورة:</label>
                    <input type="file" id="f-img" accept="image/*" class="w-full text-xs">
                </div>
                <input type="text" id="f-name" placeholder="اسم السكربت" class="w-full p-3 rounded-lg">
                <input type="text" id="f-map" placeholder="اسم الماب" class="w-full p-3 rounded-lg">
                <textarea id="f-desc" placeholder="الوصف" class="w-full p-3 rounded-lg h-20"></textarea>
                <textarea id="f-code" placeholder="كود Lua" class="w-full p-3 rounded-lg h-32 font-mono text-xs"></textarea>
                <button onclick="publishScript()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold" data-tr="publishBtn">انشر الآن</button>
            </div>
        </div>
    </div>

    <script>
        let scripts = JSON.parse(localStorage.getItem('kry_scripts')) || [];
        let users = JSON.parse(localStorage.getItem('kry_users')) || [];
        let bannedIPs = JSON.parse(localStorage.getItem('kry_banned_ips')) || [];
        let currentUser = JSON.parse(localStorage.getItem('kry_session')) || null;
        let currentLang = 'ar';
        let authMode = 'login';

        const dict = {
            ar: {
                loginBtn: "دخول", publishNav: "انشر", logout: "خروج", heroTitle: "سكربتات Roblox",
                searchPlace: "ابحث عن سكربت...", loginTab: "دخول", signupTab: "تسجيل", confirmBtn: "تأكيد",
                publishTitle: "نشر سكربت جديد", publishAnon: "نشر كمجهول", fileLabel: "اختر صورة السكربت:",
                publishBtn: "انشر الآن", copyBtn: "نسخ الكود", deleteBtn: "حذف", editBtn: "تعديل",
                alertText: "هذا الشخص مجهول الهوية ربما السكربت يكون مضر", sensitivity: "حماية حساسية"
            },
            en: {
                loginBtn: "Login", publishNav: "Publish", logout: "Logout", heroTitle: "Roblox Scripts",
                searchPlace: "Search scripts...", loginTab: "Login", signupTab: "Sign Up", confirmBtn: "Confirm",
                publishTitle: "Post New Script", publishAnon: "Post Anonymous", fileLabel: "Choose script image:",
                publishBtn: "Post Now", copyBtn: "Copy Code", deleteBtn: "Delete", editBtn: "Edit",
                alertText: "Anonymous user, script might be dangerous.", sensitivity: "Sensitivity"
            }
        };

        // وظائف الواجهة
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function setAuthMode(m) { 
            authMode = m; 
            document.getElementById('btn-m-login').className = m === 'login' ? 'pb-2 border-b-2 border-cyan-500' : 'pb-2 text-gray-500';
            document.getElementById('btn-m-signup').className = m === 'signup' ? 'pb-2 border-b-2 border-cyan-500' : 'pb-2 text-gray-500';
        }

        // تسجيل الدخول
        function submitAuth() {
            const u = document.getElementById('auth-u').value.trim();
            const p = document.getElementById('auth-p').value.trim();
            if(!u || !p) return alert("املاً الحقول");

            if(authMode === 'signup') {
                users.push({username: u, password: p});
                localStorage.setItem('kry_users', JSON.stringify(users));
                setAuthMode('login');
            } else {
                if(u.toUpperCase() === "IVAR" && p === "IVAR123") currentUser = {username: "IVAR", isAdmin: true};
                else {
                    const found = users.find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
                    if(found) currentUser = found; else return alert("خطأ!");
                }
                localStorage.setItem('kry_session', JSON.stringify(currentUser));
                location.reload();
            }
        }

        function logout() { localStorage.removeItem('kry_session'); location.reload(); }

        // النشر
        async function publishScript() {
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            const userIP = ipData.ip;

            const name = document.getElementById('f-name').value;
            const map = document.getElementById('f-map').value;
            const file = document.getElementById('f-img').files[0];
            const isAnon = document.getElementById('check-anon').checked;

            if(!name || !map) return alert("الاسم والماب مطلوبان");

            const reader = new FileReader();
            reader.onload = (e) => {
                scripts.unshift({
                    id: Date.now(),
                    name: name,
                    map: map,
                    desc: document.getElementById('f-desc').value,
                    code: document.getElementById('f-code').value,
                    image: e.target.result || null,
                    author: isAnon ? "Anonymous" : (currentUser ? currentUser.username : "Anonymous"),
                    ip: userIP
                });
                localStorage.setItem('kry_scripts', JSON.stringify(scripts));
                location.reload();
            };
            if(file) reader.readAsDataURL(file); else reader.onload({target:{result:null}});
        }

        // العرض
        function render() {
            const container = document.getElementById('scripts-container');
            container.innerHTML = '';
            const l = dict[currentLang];
            const isIVAR = currentUser && currentUser.username.toUpperCase() === "IVAR";

            scripts.forEach(s => {
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-2xl flex flex-col relative script-item";
                card.setAttribute('data-search', s.name + s.map + s.author);
                card.innerHTML = `
                    ${s.image ? `<img src="${s.image}" class="w-full h-32 object-cover rounded-xl mb-3">` : ''}
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold">${s.name}</h4>
                        ${s.author === "Anonymous" ? `<span class="bg-red-500/20 text-red-500 text-[9px] px-2 py-1 rounded cursor-help" onmousedown="showAlert()" onmouseup="hideAlert()">${l.sensitivity}</span>` : ''}
                    </div>
                    <div class="mb-3"><span class="map-tag">${s.map}</span></div>
                    <p class="text-[10px] text-gray-400 mb-4 h-8 overflow-hidden">${s.desc}</p>
                    <div class="flex gap-2">
                        <button onclick="copy('${s.code}')" class="flex-1 bg-cyan-600/20 text-cyan-400 py-2 rounded-lg font-bold border border-cyan-400/30">${l.copyBtn}</button>
                        ${isIVAR || (currentUser && currentUser.username === s.author) ? `
                            <button onclick="del(${s.id})" class="text-red-500 text-xs">✕</button>
                        ` : ''}
                    </div>
                    ${isIVAR ? `
                        <div class="mt-4 p-2 bg-red-500/5 rounded border border-red-500/10 text-[8px]">
                            <p>IP: ${s.ip}</p>
                            <button onclick="ban('${s.ip}')" class="text-red-500 underline">حظر الناشر</button>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        // الإدارة
        function del(id) { if(confirm("حذف؟")) { scripts = scripts.filter(x=>x.id!==id); localStorage.setItem('kry_scripts', JSON.stringify(scripts)); render(); } }
        function copy(t) { navigator.clipboard.writeText(t); alert("تم النسخ"); }
        function ban(ip) { if(!bannedIPs.includes(ip)) { bannedIPs.push(ip); localStorage.setItem('kry_banned_ips', JSON.stringify(bannedIPs)); location.reload(); } }
        function unban(ip) { bannedIPs = bannedIPs.filter(x=>x!==ip); localStorage.setItem('kry_banned_ips', JSON.stringify(bannedIPs)); location.reload(); }

        function showAlert() { document.getElementById('top-alert').classList.add('show'); }
        function hideAlert() { document.getElementById('top-alert').classList.remove('show'); }

        function filterScripts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.script-item').forEach(el => {
                el.style.display = el.getAttribute('data-search').toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            location.reload(); // لإعادة تطبيق الترجمات بسهولة
        }

        // تحضير الواجهة
        if(currentUser) {
            document.getElementById('user-ui').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = currentUser.username;
            document.getElementById('login-nav-btn').classList.add('hidden');
            if(currentUser.isAdmin) {
                document.getElementById('ban-list-panel').classList.remove('hidden');
                document.getElementById('banned-ips-container').innerHTML = bannedIPs.map(ip => `<div>${ip} <button onclick="unban('${ip}')" class="text-cyan-400">فك</button></div>`).join('');
            }
        }

        // فحص الحظر
        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d => {
            if(bannedIPs.includes(d.ip)) document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:100px;'>You are banned by IVAR</h1>";
        });

        // تأثير الثلج
        (function() {
            const canvas = document.getElementById('snow-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, flakes = [];
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            function init() { flakes = []; for(let i=0; i<40; i++) flakes.push({x: Math.random()*w, y: Math.random()*h, r: Math.random()*2+1, d: Math.random()*0.5}); }
            function draw() { ctx.clearRect(0,0,w,h); ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); for(let f of flakes) { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); } ctx.fill(); move(); }
            function move() { for(let f of flakes) { f.y += 0.5 + f.d; if(f.y > h) f.y = -10; } }
            function loop() { draw(); requestAnimationFrame(loop); }
            window.onresize = resize; resize(); init(); loop();
        })();

        render();
    </script>
</body>
</html>
