<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYhub | IVAR Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', 'Poppins', sans-serif; background: #020202; color: white; overflow-x: hidden; position: relative; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.3s; }
        .neon-cyan { color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.4); }
        .modal-bg { background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(12px); z-index: 60; }
        input, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        #top-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(255, 68, 68, 0.95); color: white; padding: 12px 30px; border-radius: 0 0 20px 20px; z-index: 200; transition: 0.4s; font-weight: bold; pointer-events: none; }
        #top-alert.show { top: 0; }
        .hidden { display: none !important; }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; opacity: 0.6; font-size: 20px; }
        /* تحسين زر اختيار الملف */
        input[type="file"]::file-selector-button { background: #00ffff; color: black; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-left: 10px; font-weight: bold; }
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen">
    <canvas id="snow-canvas"></canvas>
    <div id="top-alert" data-tr="alertText">هذا الشخص مجهول الهوية ربما السكربت يكون مضر</div>

    <div id="ban-manager" class="hidden fixed bottom-5 left-5 z-50 glass p-4 rounded-2xl border-red-500/30">
        <h4 class="text-[10px] font-bold text-red-500 mb-2">قائمة الحظر (IP BAN)</h4>
        <div id="banned-list" class="space-y-1"></div>
    </div>

    <div class="content-layer relative z-10">
        <nav class="glass sticky top-0 p-4 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="text-3xl font-black neon-cyan" onclick="location.reload()">KRY<span class="text-white">hub</span></h1>
                </div>
                <div class="flex gap-4 items-center">
                    <div id="user-info" class="hidden flex items-center gap-3">
                        <span id="logged-username" class="text-cyan-400 font-bold text-sm bg-cyan-400/10 px-3 py-1 rounded-full"></span>
                        <button onclick="logout()" class="text-[10px] text-red-500" data-tr="logout">خروج</button>
                    </div>
                    <button id="auth-nav-btn" onclick="openModal('auth-modal')" class="text-sm font-bold" data-tr="loginBtn">دخول</button>
                    <button onclick="openModal('publish-modal')" class="bg-cyan-600 px-5 py-2 rounded-xl text-sm font-bold" data-tr="publishNav">انشر</button>
                    <button onclick="toggleLang()" class="text-xs font-bold" id="lang-btn">EN</button>
                </div>
            </div>
        </nav>

        <header class="py-12 px-4 text-center">
            <h2 class="text-4xl font-black mb-4" data-tr="heroTitle">مجتمع سكربتات Roblox Lua</h2>
            <div class="max-w-2xl mx-auto relative group">
                <input type="text" id="search-input" oninput="filterScripts()" placeholder="ابحث..." data-tr-placeholder="searchPlace" class="w-full p-4 rounded-2xl">
            </div>
        </header>

        <main class="container mx-auto px-4 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="scripts-container"></div>
        </main>
    </div>

    <div id="auth-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-bg hidden">
        <div class="glass w-full max-w-md rounded-3xl p-8 relative">
            <div class="close-btn" onclick="closeModal('auth-modal')">✕</div>
            <div class="flex gap-6 mb-8 border-b border-white/5">
                <button onclick="toggleAuthMode('login')" id="tab-login" class="pb-3 border-b-2 border-cyan-500" data-tr="loginTab">دخول</button>
                <button onclick="toggleAuthMode('signup')" id="tab-signup" class="pb-3 text-gray-500" data-tr="signupTab">تسجيل</button>
            </div>
            <input type="text" id="auth-user" placeholder="اسم المستخدم" data-tr-placeholder="userPlace" class="w-full p-4 rounded-xl mb-4">
            <input type="password" id="auth-pass" placeholder="الرمز السري" data-tr-placeholder="passPlace" class="w-full p-4 rounded-xl mb-4">
            <button onclick="handleAuth()" class="w-full py-4 bg-cyan-600 rounded-xl font-bold" data-tr="confirmBtn">تأكيد</button>
        </div>
    </div>

    <div id="publish-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-bg hidden">
        <div class="glass w-full max-w-2xl rounded-3xl p-8 relative">
            <div class="close-btn" onclick="closeModal('publish-modal')">✕</div>
            <h2 class="text-2xl font-bold text-cyan-400 mb-6" data-tr="publishTitle">نشر سكربت جديد</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                    <span class="text-sm font-bold" data-tr="publishAnon">نشر كمجهول (Anonymous)</span>
                    <input type="checkbox" id="anon-check" class="w-5 h-5 accent-cyan-500">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-cyan-400 font-bold" data-tr="fileLabel">اختر صورة السكربت</label>
                    <input type="file" id="in-file" accept="image/*" class="w-full text-xs">
                </div>
                <input type="text" id="in-name" placeholder="اسم السكربت" data-tr-placeholder="scriptNamePlace" class="w-full p-4 rounded-xl">
                <input type="text" id="in-map" placeholder="اسم الماب" data-tr-placeholder="mapNamePlace" class="w-full p-4 rounded-xl">
                <textarea id="in-desc" rows="2" placeholder="الوصف" data-tr-placeholder="descPlace" class="w-full p-4 rounded-xl"></textarea>
                <textarea id="in-code" rows="5" placeholder="كود Lua" data-tr-placeholder="codePlace" class="w-full p-4 rounded-xl font-mono text-xs"></textarea>
                <button onclick="processPublish()" class="w-full py-4 bg-cyan-600 font-bold rounded-2xl shadow-xl" data-tr="publishBtn">انشر الآن</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('kry_session')) || null;
        let scripts = JSON.parse(localStorage.getItem('kry_scripts')) || [];
        let users = JSON.parse(localStorage.getItem('kry_users')) || [];
        let bannedIPs = JSON.parse(localStorage.getItem('kry_banned_ips')) || [];
        let currentLang = 'ar';
        let authMode = 'login';
        let pressTimer;

        const dictionary = {
            ar: {
                loginBtn: "دخول", publishNav: "انشر", logout: "خروج", heroTitle: "سكربتات Roblox", 
                searchPlace: "ابحث...", loginTab: "دخول", signupTab: "تسجيل", userPlace: "الاسم", passPlace: "الرمز", 
                confirmBtn: "تأكيد", publishTitle: "نشر جديد", publishAnon: "مجهول", fileLabel: "اختر ملف صورة:", 
                scriptNamePlace: "اسم السكربت", mapNamePlace: "اسم الماب", descPlace: "وصف السكربت", codePlace: "كود Lua", 
                publishBtn: "انشر الآن", copyBtn: "نسخ الكود", deleteBtn: "حذف", editBtn: "تعديل", sensitivity: "حماية حساسية", 
                alertText: "هذا الشخص مجهول الهوية ربما السكربت يكون مضر", banBtn: "حظر IP", unbanBtn: "فك الحظر"
            },
            en: {
                loginBtn: "Login", publishNav: "Publish", logout: "Logout", heroTitle: "Roblox Scripts", 
                searchPlace: "Search...", loginTab: "Login", signupTab: "Sign Up", userPlace: "User", passPlace: "Pass", 
                confirmBtn: "Confirm", publishTitle: "Post Script", publishAnon: "Anonymous", fileLabel: "Choose Image:", 
                scriptNamePlace: "Script Name", mapNamePlace: "Map Name", descPlace: "Description", codePlace: "Lua Code", 
                publishBtn: "Post Now", copyBtn: "Copy", deleteBtn: "Delete", editBtn: "Edit", sensitivity: "Sensitivity", 
                alertText: "Anonymous user, script might be dangerous.", banBtn: "Ban IP", unbanBtn: "Unban"
            }
        };

        // فحص الحظر عند دخول الصفحة
        async function checkBan() {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            if(bannedIPs.includes(data.ip)) {
                document.body.innerHTML = "<div style='text-align:center; padding:100px;'><h1>تم حظرك من الموقع بواسطة IVAR</h1><p>You are banned by admin.</p></div>";
            }
            return data.ip;
        }

        async function processPublish() {
            const userIP = await checkBan();
            const n = document.getElementById('in-name').value;
            const m = document.getElementById('in-map').value;
            const isAnon = document.getElementById('anon-check').checked;
            const f = document.getElementById('in-file').files[0];

            if(!n || !m) return alert("املاً البيانات!");

            const reader = new FileReader();
            reader.onload = (e) => {
                scripts.unshift({ 
                    id: Date.now(), name: n, map: m, 
                    desc: document.getElementById('in-desc').value, 
                    code: document.getElementById('in-code').value, 
                    image: e.target.result || null, 
                    author: isAnon ? "Anonymous" : (currentUser ? currentUser.username : "Anonymous"),
                    ip: userIP // حفظ الـ IP سرياً
                });
                localStorage.setItem('kry_scripts', JSON.stringify(scripts));
                renderScripts(); closeModal('publish-modal');
            };
            if(f) reader.readAsDataURL(f); else reader.onload({target:{result:null}});
        }

        function renderScripts() {
            const container = document.getElementById('scripts-container');
            container.innerHTML = '';
            const l = dictionary[currentLang];
            const isIVAR = currentUser && currentUser.username.toUpperCase() === "IVAR";

            scripts.forEach(s => {
                const card = document.createElement('div');
                card.className = "glass p-6 rounded-3xl flex flex-col relative";
                card.innerHTML = `
                    ${s.image ? `<img src="${s.image}" class="w-full h-40 object-cover rounded-2xl mb-4">` : ''}
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold">${s.name}</h3>
                        ${s.author === "Anonymous" ? `<span class="bg-red-500/20 text-red-500 text-[9px] px-2 py-1 rounded-md cursor-help" onmousedown="startPress()" onmouseup="endPress()" ontouchstart="startPress()" ontouchend="endPress()">${l.sensitivity}</span>` : ''}
                    </div>
                    <div class="mb-4"><span class="map-tag">${s.map}</span></div>
                    <p class="text-xs text-gray-400 mb-6">${s.desc}</p>
                    <div class="flex gap-2">
                        <button onclick="copyCode('${s.code}')" class="flex-1 bg-cyan-600 py-3 rounded-xl font-bold">${l.copyBtn}</button>
                        ${isIVAR || (currentUser && currentUser.username === s.author) ? `
                            <button onclick="editScript(${s.id})" class="text-cyan-400 text-xs">${l.editBtn}</button>
                            <button onclick="deleteScript(${s.id})" class="text-red-500 text-xs">${l.deleteBtn}</button>
                        ` : ''}
                    </div>
                    ${isIVAR ? `
                        <div class="mt-4 p-2 bg-red-500/10 rounded-lg border border-red-500/20">
                            <p class="text-[9px] text-red-400">ADMIN: IP الناشر: ${s.ip}</p>
                            <button onclick="banIP('${s.ip}')" class="text-[9px] bg-red-600 px-2 py-1 rounded mt-1 font-bold text-white">${l.banBtn}</button>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        function banIP(ip) {
            if(!confirm("هل تريد حظر هذا الـ IP نهائياً؟")) return;
            if(!bannedIPs.includes(ip)) bannedIPs.push(ip);
            localStorage.setItem('kry_banned_ips', JSON.stringify(bannedIPs));
            updateBanManager();
            alert("تم حظر المستخدم!");
        }

        function unbanIP(ip) {
            bannedIPs = bannedIPs.filter(x => x !== ip);
            localStorage.setItem('kry_banned_ips', JSON.stringify(bannedIPs));
            updateBanManager();
        }

        function updateBanManager() {
            const isIVAR = currentUser && currentUser.username.toUpperCase() === "IVAR";
            const manager = document.getElementById('ban-manager');
            const list = document.getElementById('banned-list');
            if(!isIVAR) return manager.classList.add('hidden');
            
            manager.classList.remove('hidden');
            list.innerHTML = bannedIPs.map(ip => `
                <div class="flex justify-between items-center gap-4 text-[9px]">
                    <span>${ip}</span>
                    <button onclick="unbanIP('${ip}')" class="text-cyan-400">فك الحظر</button>
                </div>
            `).join('');
        }

        function deleteScript(id) { if(confirm("حذف السكربت؟")) { scripts = scripts.filter(x=>x.id!==id); localStorage.setItem('kry_scripts', JSON.stringify(scripts)); renderScripts(); } }
        
        function editScript(id) {
            const s = scripts.find(x => x.id === id);
            const newName = prompt("تعديل الاسم:", s.name);
            if(newName) {
                s.name = newName;
                localStorage.setItem('kry_scripts', JSON.stringify(scripts));
                renderScripts();
            }
        }

        function startPress() { pressTimer = setTimeout(() => { document.getElementById('top-alert').classList.add('show'); }, 300); }
        function endPress() { clearTimeout(pressTimer); document.getElementById('top-alert').classList.remove('show'); }
        function copyCode(t) { navigator.clipboard.writeText(t); alert(dictionary[currentLang].msgCopied || "تم النسخ!"); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function toggleAuthMode(m) { authMode = m; document.getElementById('tab-login').classList.toggle('border-cyan-500', m==='login'); document.getElementById('tab-signup').classList.toggle('border-cyan-500', m==='signup'); }
        
        function handleAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(!u || !p) return;
            if(authMode === 'signup') {
                users.push({username: u, password: p});
                localStorage.setItem('kry_users', JSON.stringify(users));
                toggleAuthMode('login');
            } else {
                const f = users.find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
                if(u.toUpperCase() === "IVAR" && p === "IVAR123") currentUser = {username: "IVAR", isAdmin: true};
                else if(f) currentUser = f; else return alert("خطأ!");
                localStorage.setItem('kry_session', JSON.stringify(currentUser));
                updateUI(); closeModal('auth-modal');
            }
        }

        function updateUI() {
            if(currentUser) {
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('logged-username').innerText = currentUser.username;
                document.getElementById('auth-nav-btn').classList.add('hidden');
            } else {
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('auth-nav-btn').classList.remove('hidden');
            }
            applyTranslation();
            updateBanManager();
        }

        function applyTranslation() {
            const l = dictionary[currentLang];
            document.querySelectorAll('[data-tr]').forEach(el => el.innerText = l[el.getAttribute('data-tr')]);
            document.querySelectorAll('[data-tr-placeholder]').forEach(el => el.placeholder = l[el.getAttribute('data-tr-placeholder')]);
            document.getElementById('lang-btn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            renderScripts();
        }

        function toggleLang() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; applyTranslation(); }
        
        // Snow Effect
        (function() {
            const canvas = document.getElementById('snow-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, flakes = [];
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            function init() { flakes = []; for(let i=0; i<50; i++) flakes.push({x: Math.random()*w, y: Math.random()*h, r: Math.random()*2+1, d: Math.random()*0.5}); }
            function draw() { ctx.clearRect(0,0,w,h); ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); for(let f of flakes) { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); } ctx.fill(); move(); }
            function move() { for(let f of flakes) { f.y += 0.5 + f.d; if(f.y > h) f.y = -10; } }
            function loop() { draw(); requestAnimationFrame(loop); }
            window.onresize = resize; resize(); init(); loop();
        })();

        checkBan();
        updateUI();
    </script>
</body>
</html>
